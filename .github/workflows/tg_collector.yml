name: tg_collector

on:
  workflow_dispatch: # 允许手动点击运行
  push:
    paths:
      - 'tg_collector.py'                # 当脚本变动时触发
      - '.github/workflows/tg_collector.yml' # 当工作流变动时触发
  schedule:
    - cron: '0 */1 * * *' # 每小时运行一次

jobs:
  run-collector:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须开启写入权限

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史以确保 rebase 成功

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
         

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests tqdm

      - name: Run Collector Script
        run: python tg_collector.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 1. 先将变更加入暂存区
          git add tg_collector.txt sub.txt valid_subs.txt tg_channel_stats.csv
          
          # 2. 检查是否有实际变动
          if git diff --cached --quiet; then
            echo "没有检测到文件变动，跳过。"
          else
            # 3. 核心修复：先 Commit 到本地仓库，让工作区变“干净”
            export TZ='Asia/Shanghai'
            NODE_COUNT=$(grep -c '://' tg_collector.txt || echo 0)
            SUB_COUNT=$(wc -l < valid_subs.txt || echo 0)
            
            git commit -m "Auto Update | 节点: $NODE_COUNT | 订阅: $SUB_COUNT | $(date +'%Y-%m-%d %H:%M:%S')"
            
            # 4. 此时再拉取远程更新并 Rebase，Git 不会再报 "uncommitted changes" 错误
            git pull origin main --rebase
            
            # 5. 推送合并后的结果
            git push origin main
          fi
