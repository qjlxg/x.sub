name: tg_collector

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

jobs:
  run-collector:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          

      - name: Install Dependencies
        run: pip install requests tqdm

      - name: Run Script
        run: python tg_collector.py

      - name: Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          

          git add tg_collector.txt sub.txt valid_subs.txt tg_channel_stats.csv
          
          if git diff --cached --quiet; then
            echo "No changes."
          else
            export TZ='Asia/Shanghai'
            git commit -m "Auto Update | Nodes: $(grep -c '://' tg_collector.txt) | Subs: $(wc -l < valid_subs.txt)"
            git push
          fi
