name: GitHub Leak Collector

on:
  workflow_dispatch:
  push:
    paths:
      - 'gh_leak_collector.py'
      - '.github/workflows/gh_leak.yml'
  schedule:
    - cron: '0 */2 * * *'

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run GitHub Leak Script
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
          MY_BOT_NAME: ${{ secrets.BOT }}
        run: python gh_leak_collector.py

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add github_leaks.txt
          if git diff --cached --quiet; then
            echo "No changes."
          else
            export TZ='Asia/Shanghai'
            # Secret 在命令行直接打印会是空或星号，这里用变量名占位
            git commit -m "Auto-Update by LeakBot at $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
