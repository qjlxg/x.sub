name: GitHub Leak Collector

on:
  workflow_dispatch:
  push:
    paths:
      - 'gh_leak_collector.py'
      - '.github/workflows/gh_leak.yml'
  schedule:
    - cron: '0 */2 * * *'

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run GitHub Leak Script
        env:
        
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
          MY_BOT_NAME: ${{ vars.BOT }}
        run: python gh_leak_collector.py

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add github_leaks.txt domains_to_register.txt
          
          if git diff --cached --quiet; then
            echo "No changes detected."
          else
            export TZ='Asia/Shanghai'
            git commit -m "Auto-Update: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
